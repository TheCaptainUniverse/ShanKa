name: Release Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"
        type: string
      run_smoke:
        description: "Run packaged Windows executable smoke checks on the CI runner"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-2022
            args: ""
            rustTarget: ""
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
            rustTarget: ""
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTarget: "aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-15-intel
            args: "--target x86_64-apple-darwin"
            rustTarget: "x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rustTarget != ''
        run: rustup target add ${{ matrix.rustTarget }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "Shanka ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: "Cross-platform Shanka desktop packages. This release is unsigned unless noted otherwise."
          releaseDraft: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          args: ${{ matrix.args }}

      - name: Smoke packaged executable
        if: ${{ startsWith(matrix.platform, 'windows-') && github.event_name == 'workflow_dispatch' && inputs.run_smoke }}
        run: bun run release:smoke

      - name: Smoke manual text launcher
        if: ${{ startsWith(matrix.platform, 'windows-') && github.event_name == 'workflow_dispatch' && inputs.run_smoke }}
        run: bun run release:manual-text-smoke

      - name: Smoke MSI package metadata
        if: startsWith(matrix.platform, 'windows-')
        run: bun run release:msi-smoke

      - name: Generate release manifest
        if: startsWith(matrix.platform, 'windows-')
        run: bun run release:manifest

      - name: Upload release manifest
        if: startsWith(matrix.platform, 'windows-')
        uses: actions/upload-artifact@v4
        with:
          name: shanka-release-manifest
          if-no-files-found: error
          path: docs/release/*.md

name: Windows Release Package

on:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: "Run packaged executable smoke check on the CI runner"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality gate
        run: bun run check

      - name: Build Tauri bundles
        run: bun run tauri build

      - name: Smoke packaged executable
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke }}
        run: bun run release:smoke

      - name: Generate release manifest
        run: bun run release:manifest

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: shanka-windows-installers
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: shanka-release-manifest
          if-no-files-found: error
          path: docs/release/*.md
